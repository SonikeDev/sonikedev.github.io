<script> 
    function toggleTheme() { 
        // Obtains an array of all <link> 
        // elements. 
        // Select your element using indexing. 
        var theme = document.getElementsByTagName('link')[0]; 
   
        // Change the value of href attribute  
        // to change the css sheet. 
        if (theme.getAttribute('href') == 'light-style.css') { 
            theme.setAttribute('href', 'dark-style.css'); 
        } else { 
            theme.setAttribute('href', 'light-style.css'); 
        } 
    } 
   </script>

   <div class="themeSwitchLight">
    <i class="fa-solid fa-moon" onclick="toggleTheme()"></i>
   </div>

   <div class="themeSwitchDark">
    <i class="fa-solid fa-sun" onclick="toggleTheme()"></i>
